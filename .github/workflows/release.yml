name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test-before-release:
    uses: ./.github/workflows/test.yml
    with: {}
    secrets: inherit

  release:
    runs-on: ubuntu-latest
    needs: test-before-release
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync release dependencies
        run: uv sync --extra release

      - name: Generate CHANGELOG
        run: |
          if git log $(git describe --tags --abbrev=0)..HEAD --oneline | grep -q .; then
            uv run cz changelog
          else
            echo "No new commits"
          fi

      - name: Commit updated CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: update changelog for $GITHUB_REF_NAME" || echo "No changes to commit"
          git push origin HEAD:main

      - name: Build package
        run: uv build

      - name: Check package
        run: uv run twine check dist/*

      - name: Extract release notes
        run: |
          awk -v hdr="## ${GITHUB_REF_NAME} " '
            /^## v/ { if (found) exit; if (index($0, hdr) == 1) { found=1; next } }
            found { print }
          ' CHANGELOG.md > release_notes.md
          [ -s release_notes.md ] || echo "Release ${GITHUB_REF_NAME}" > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: false

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
