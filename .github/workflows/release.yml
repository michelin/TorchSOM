name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test-before-release:
    uses: ./.github/workflows/test.yml
    with: {}
    secrets: inherit

  release:
    runs-on: ubuntu-latest
    needs: test-before-release
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync release dependencies
        run: uv sync --extra release

      - name: Generate CHANGELOG
        run: |
          if git log $(git describe --tags --abbrev=0)..HEAD --oneline | grep -q .; then
            uv run cz changelog
          else
            echo "No new commits"
          fi

      - name: Commit updated CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: update changelog for $GITHUB_REF_NAME" || echo "No changes to commit"
          git push origin HEAD:main

      - name: Build package
        run: uv build

      - name: Check package
        run: uv run twine check dist/*

      - name: Extract changelog
        id: changelog
        run: |
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          sed -n '/## \['"$GITHUB_REF_NAME"'\]/,/^## \[/{/^## \[/b;p}' CHANGELOG.md >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Release
        uses: actions/create-release@v1.1.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref }}
          body: ${{ env.RELEASE_NOTES }}
          draft: false
          prerelease: false

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
