general:
  random_seed: 42
  data_name: blobs_300_300 # 300 5000 20000 and 4 50 300
  n_iter: 10
  mode: local # local or azure
  output_dir: results
  device: cpu # cpu or cuda (drives torchsom device; somoclu is GPU-only, so set cuda to include it)
  use_torchsom: true
  use_minisom: true # standard online train(), no JIT -> the canonical CPU baseline
  use_minisom_jit: true # numba batch-offline train_batch_offline_fast() (CPU); needs MiniSom dev branch + numba
  use_somoclu: true # GPU-only baseline (C++/CUDA, kerneltype=1); only runs when device=cuda; needs a CUDA-compiled binary
  train_ratio: 0.8
  save_plots: false
  save_format: pdf

som:
  x_size: 25
  y_size: 15
  sigma: 1.45
  learning_rate: 0.95
  epochs: 100
  topology: rectangular
  initialization_mode: pca
  neighborhood_order: 3
  use_faiss: false # torchsom BMU search: false -> native PyTorch; true -> FAISS (needs faiss-cpu, or faiss-gpu for a CUDA index)
  # batch_size: 4000  # if omitted, uses full train set per epoch as in notebook
  verbose: true
